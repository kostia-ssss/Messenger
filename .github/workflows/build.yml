name: Auto Build EXE

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter

      - name: Clean build
        run: |
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist
          if exist Messenger.spec del Messenger.spec

      - name: Build EXE
        run: pyinstaller --onefile --clean --name Messenger main.py

      - name: Debug output
        run: dir dist

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          artifacts: dist/Messenger.exe
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}